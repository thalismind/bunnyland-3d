<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunnyland 3D</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: #0b110d;
        color: #edf2df;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      #app {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      #toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 10px;
        border-bottom: 1px solid #2d3c31;
        background: #111912;
        font-size: 12px;
      }

      #api-url {
        width: 260px;
      }

      input,
      button {
        min-height: 28px;
        border: 1px solid #506457;
        border-radius: 4px;
        background: #1f2d23;
        color: #edf2df;
      }

      button {
        cursor: pointer;
      }

      #status.ok {
        color: #a6e3a1;
      }

      #status.err {
        color: #f38ba8;
      }

      #main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        min-height: 0;
      }

      #viewer {
        position: relative;
        min-width: 0;
        min-height: 0;
      }

      #viewer canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #side {
        min-height: 0;
        overflow: auto;
        border-left: 1px solid #2d3c31;
        background: #111912;
      }

      .panel {
        padding: 10px;
        border-bottom: 1px solid #2d3c31;
      }

      .room-row,
      .entity-row {
        display: block;
        width: 100%;
        margin: 0 0 6px;
        padding: 7px 8px;
        border: 1px solid #506457;
        border-radius: 4px;
        background: #1f2d23;
        color: #edf2df;
        text-align: left;
      }

      .room-row.active {
        border-color: #a6e3a1;
      }

      .muted {
        color: #aeb8a4;
        font-size: 11px;
      }

      @media (max-width: 900px) {
        #main {
          grid-template-columns: minmax(0, 1fr);
          grid-template-rows: minmax(360px, 1fr) 280px;
        }

        #side {
          border-left: 0;
          border-top: 1px solid #2d3c31;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <strong>Bunnyland 3D</strong>
        <label for="api-url">Server</label>
        <input id="api-url" value="/api/" spellcheck="false">
        <button id="btn-load" type="button">Load</button>
        <button id="btn-refresh" type="button">Refresh</button>
        <button id="btn-mode" type="button">2D</button>
        <button id="btn-camera" type="button">Auto Camera</button>
        <button id="btn-capture" type="button">📷 Download</button>
        <span id="epoch"></span>
        <span id="status">Ready</span>
      </div>
      <main id="main">
        <section id="viewer"></section>
        <aside id="side">
          <section class="panel">
            <h2 id="selected-title">No room selected</h2>
            <div id="selected-meta" class="muted"></div>
            <div id="selected-entities" class="muted">Load an overview.</div>
          </section>
          <section class="panel">
            <h2>Rooms</h2>
            <div id="room-list" class="muted">No overview loaded.</div>
          </section>
        </aside>
      </main>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
