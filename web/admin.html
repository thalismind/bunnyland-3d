<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunnyland 3D Admin</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      #app {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
      }

      #api-url {
        width: 260px;
        flex: 0 1 260px;
      }

      input,
      select,
      button {
        min-height: 28px;
        border: 1px solid var(--bl-border-control);
        border-radius: var(--bl-radius-sm);
        background: var(--bl-surface);
        color: var(--bl-text);
      }

      button {
        cursor: pointer;
      }

      #status.ok {
        color: var(--bl-ok);
      }

      #status.err {
        color: var(--bl-error);
      }

      #main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 320px;
        min-height: 0;
      }

      #viewer {
        position: relative;
        min-width: 0;
        min-height: 0;
      }

      #viewer canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #side {
        min-height: 0;
        overflow: auto;
        border-left: 1px solid var(--bl-border);
        background: var(--bl-bg-strong);
      }

      .panel {
        padding: 10px;
        border-bottom: 1px solid var(--bl-border);
      }

      .room-row,
      .entity-row {
        display: block;
        width: 100%;
        margin: 0 0 6px;
        padding: 7px 8px;
        border: 1px solid var(--bl-border-control);
        border-radius: var(--bl-radius-sm);
        background: var(--bl-surface);
        color: var(--bl-text);
        text-align: left;
      }

      .room-row.active {
        border-color: var(--bl-ok);
      }

      .entity-row.active {
        border-color: var(--bl-warn);
      }

      .muted {
        color: var(--bl-text-soft);
        font-size: var(--bl-text-sm);
      }

      .control-grid {
        display: grid;
        gap: 7px;
      }

      .control-grid label {
        display: flex;
        gap: 7px;
        align-items: center;
      }

      @media (max-width: 900px) {
        #main {
          grid-template-columns: minmax(0, 1fr);
          grid-template-rows: minmax(360px, 1fr) 280px;
        }

        #side {
          border-left: 0;
          border-top: 1px solid var(--bl-border);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
