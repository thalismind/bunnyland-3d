<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunnyland 3D Player</title>
    <style>
      :root { font-family: system-ui, sans-serif; }
      * { box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      #app { display: grid; grid-template-rows: auto minmax(0, 1fr); }
      #api-url, #character-select { width: 100%; }
      #claim-timeout { width: 62px; }
      input, select, button {
        min-height: 28px;
        border: 1px solid var(--bl-border-control);
        border-radius: var(--bl-radius-sm);
        background: var(--bl-surface);
        color: var(--bl-text);
      }
      button { cursor: pointer; }
      .toolbar-heading.player-toolbar { flex-wrap: wrap; }
      .player-toolbar .toolbar-brand { flex: 1 1 190px; }
      .toolbar-character {
        max-width: 180px;
        color: var(--bl-text);
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .toolbar-points { color: var(--bl-text-soft); font-size: var(--bl-text-sm); }
      #btn-request-image, #btn-capture {
        min-width: max-content;
        white-space: nowrap;
      }
      #main {
        position: relative;
        overflow: hidden;
        min-height: 0;
      }
      #viewer { position: absolute; inset: 0; min-width: 0; min-height: 0; }
      #viewer canvas { display: block; width: 100%; height: 100%; }
      #side {
        position: absolute;
        z-index: 20;
        inset: 12px 12px 12px auto;
        width: min(380px, calc(100% - 24px));
        overflow-x: hidden;
        overflow-y: auto;
        padding: 8px;
        scrollbar-gutter: stable;
        border: 1px solid var(--bl-border);
        border-radius: var(--bl-radius-md);
        background: var(--bl-bg-strong);
        box-shadow: var(--bl-shadow-popover);
        transition: transform 180ms ease, opacity 180ms ease;
      }
      #side.closed {
        pointer-events: none;
        opacity: 0;
        transform: translateX(calc(100% + 24px));
      }
      .panel-tabs {
        position: sticky;
        z-index: 4;
        top: -8px;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
        padding: 8px 4px;
        border-bottom: 1px solid var(--bl-border);
        background: var(--bl-bg-strong);
      }
      .panel-tabs button {
        min-width: 0;
        padding: 4px 3px;
        font-size: var(--bl-text-xs);
      }
      .panel-tabs button[aria-selected="true"] {
        border-color: var(--bl-accent);
        background: var(--bl-surface-hover);
        color: var(--bl-accent-strong);
      }
      [role="tabpanel"][hidden] { display: none; }
      #scene-summary {
        position: absolute;
        z-index: 12;
        top: 14px;
        left: 14px;
        max-width: min(420px, calc(100% - 90px));
        padding: 10px 12px;
        border: 1px solid var(--bl-border);
        border-radius: var(--bl-radius-md);
        background: var(--bl-overlay-strong);
        color: var(--bl-text);
        box-shadow: var(--bl-shadow-popover);
        pointer-events: none;
      }
      #hud-room { color: var(--bl-text-soft); font-size: var(--bl-text-sm); }
      #scene-summary.hidden { display: none; }
      #empty-state {
        position: absolute;
        z-index: 12;
        inset: 0;
        display: grid;
        place-content: center;
        gap: 8px;
        padding: 24px;
        color: var(--bl-text);
        text-align: center;
        pointer-events: none;
      }
      #empty-state.hidden { display: none; }
      #empty-state-title { font-size: clamp(22px, 4vw, 36px); font-weight: 800; }
      #empty-state-detail { color: var(--bl-text-soft); font-size: var(--bl-text-md); }
      #control-hint {
        position: absolute;
        z-index: 11;
        left: 14px;
        bottom: 14px;
        padding: 7px 9px;
        border-radius: var(--bl-radius-sm);
        background: var(--bl-overlay-strong);
        color: var(--bl-text-soft);
        font-size: var(--bl-text-xs);
        pointer-events: none;
      }
      #control-hint.hidden { display: none; }
      #exit-prompt {
        position: absolute;
        z-index: 15;
        left: 50%;
        bottom: 28px;
        display: flex;
        align-items: center;
        gap: 10px;
        transform: translateX(-50%);
        padding: 9px 10px 9px 14px;
        border: 1px solid var(--bl-accent);
        border-radius: var(--bl-radius-md);
        background: var(--bl-overlay-strong);
        color: var(--bl-text);
        box-shadow: var(--bl-shadow-popover);
      }
      #exit-prompt.hidden { display: none; }
      #remembered-map {
        display: grid;
        gap: 5px;
        align-items: stretch;
        min-height: 80px;
        max-width: 100%;
        overflow: hidden;
      }
      .map-room {
        display: grid;
        place-items: center;
        min-height: 42px;
        padding: 4px;
        border: 1px solid var(--bl-border-muted);
        border-radius: var(--bl-radius-sm);
        background: var(--bl-bg-subtle);
        color: var(--bl-text-dim);
        font-size: 12px;
        text-align: center;
      }
      .map-room span {
        display: block;
        min-width: 0;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .map-room.current { border-color: var(--bl-accent); color: var(--bl-accent-strong); }
      .panel {
        min-width: 0;
        padding: 12px;
        border-bottom: 1px solid var(--bl-border);
      }
      .panel:last-child { border-bottom: 0; }
      .panel h2 { margin: 0 0 8px; font-size: 18px; }
      .muted { color: var(--bl-text-soft); font-size: var(--bl-text-sm); }
      #status.ok { color: var(--bl-ok); }
      #status.err { color: var(--bl-error); }
      #target-line, #action-tools {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }
      #target-label {
        min-width: 0;
        flex: 1 1 auto;
        color: var(--bl-text-soft);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .portrait-panel {
        display: grid;
        grid-template-columns: 86px minmax(0, 1fr);
        gap: 10px;
        align-items: start;
      }
      .portrait-frame {
        width: 86px;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--bl-border-control);
        border-radius: var(--bl-radius-md);
        overflow: hidden;
        background: var(--bl-surface);
      }
      .portrait-frame img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .portrait-placeholder {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        color: var(--bl-accent-strong);
        background: var(--bl-bg-subtle);
        font-size: 28px;
        font-weight: 800;
      }
      .character-summary {
        display: grid;
        gap: 6px;
        min-width: 0;
      }
      .character-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      #character-name {
        min-width: 0;
        font-size: 18px;
        font-weight: 700;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #character-info {
        color: var(--bl-text-soft);
        font-size: var(--bl-text-sm);
        overflow-wrap: anywhere;
      }
      .stat-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }
      .stat-chip {
        min-width: 0;
        padding: 5px 6px;
        border: 1px solid var(--bl-border-muted);
        border-radius: var(--bl-radius-sm);
        background: var(--bl-bg-subtle);
      }
      .stat-chip strong {
        display: block;
        color: var(--bl-text-dim);
        font-size: var(--bl-text-xs);
        text-transform: uppercase;
      }
      .stat-chip span {
        display: block;
        color: var(--bl-text);
        font-size: var(--bl-text-sm);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }
      .pill {
        padding: 2px 6px;
        border: 1px solid var(--bl-border-muted);
        border-radius: var(--bl-radius-sm);
        background: var(--bl-bg-subtle);
        color: var(--bl-text-soft);
        font-size: var(--bl-text-xs);
      }
      #action-filter-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 6px;
        margin-bottom: 8px;
      }
      #action-filter { width: 100%; min-width: 0; }
      #actions {
        max-height: min(38vh, 360px);
        overflow-x: hidden;
        overflow-y: auto;
        padding-right: 4px;
        scrollbar-gutter: stable;
      }
      .queue-panel {
        position: sticky;
        top: -8px;
        z-index: 2;
        background: var(--bl-bg-strong);
      }
      .option-list { display: flex; flex-direction: column; gap: 6px; }
      .action-row, .queue-row, .option-row {
        display: block;
        min-width: 0;
        max-width: 100%;
        width: 100%;
        margin: 0 0 6px;
        padding: 7px 8px;
        border: 1px solid var(--bl-border-control);
        border-radius: var(--bl-radius-sm);
        background: var(--bl-surface);
        color: var(--bl-text);
        text-align: left;
        overflow: hidden;
      }
      .action-row:hover, .queue-row:hover, .option-row:hover { background: var(--bl-surface-hover); }
      .action-row.unavailable { opacity: 0.68; }
      .action-row.submitting { border-color: var(--bl-accent); cursor: wait; }
      .option-row.selected { border-color: var(--bl-accent); }
      .row-main {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
        font-weight: bold;
      }
      .row-main > span {
        min-width: 0;
        overflow-wrap: anywhere;
      }
      .row-detail { margin-top: 3px; color: var(--bl-text-soft); font-size: var(--bl-text-sm); }
      .row-icon { margin-right: 5px; }
      .cost.ap { color: var(--bl-warn); }
      .cost.fp { color: var(--bl-info); }
      .cost.free { color: var(--bl-text-dim); }
      .activity-row {
        padding: 7px 8px;
        border: 1px solid var(--bl-border-muted);
        border-radius: var(--bl-radius-sm);
        background: var(--bl-bg-subtle);
        color: var(--bl-text);
        font-size: var(--bl-text-sm);
        line-height: 1.3;
      }
      .activity-row.kind-rejection { color: var(--bl-warn); }
      .activity-row.kind-system { color: var(--bl-text-dim); }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }
      .gallery-item {
        display: grid;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--bl-border-muted);
        border-radius: var(--bl-radius-sm);
        background: var(--bl-bg-subtle);
        color: var(--bl-text);
        text-align: left;
      }
      .gallery-item:hover { border-color: var(--bl-accent); background: var(--bl-surface-hover); }
      .gallery-item img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        display: block;
        border-radius: var(--bl-radius-sm);
        background: var(--bl-surface);
      }
      .gallery-caption {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--bl-text-soft);
        font-size: var(--bl-text-xs);
      }
      #photo-lightbox {
        position: fixed;
        inset: 0;
        z-index: 10002;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        background: var(--bl-overlay-strong);
      }
      #photo-lightbox.hidden { display: none; }
      .lightbox-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px;
        border-bottom: 1px solid var(--bl-border);
        background: var(--bl-bg-strong);
      }
      .lightbox-title {
        min-width: 0;
        flex: 1 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .lightbox-body {
        min-width: 0;
        min-height: 0;
        display: grid;
        place-items: center;
        padding: 12px;
      }
      #photo-lightbox-img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        border: 1px solid var(--bl-border-control);
        border-radius: var(--bl-radius-md);
        background: var(--bl-surface);
      }
      .section-title {
        margin: 10px 0 6px;
        color: var(--bl-accent-strong);
        font-size: var(--bl-text-xs);
        text-transform: uppercase;
      }
      #action-form-backdrop {
        position: fixed;
        inset: 0;
        z-index: 10001;
        display: grid;
        place-items: center;
        background: var(--bl-overlay);
      }
      .action-form-card {
        width: min(380px, calc(100vw - 24px));
        border: 1px solid var(--bl-border-control);
        border-radius: var(--bl-radius-md);
        background: var(--bl-bg-strong);
        box-shadow: var(--bl-shadow-popover);
      }
      .action-form-card h2 { margin: 0; padding: 12px; border-bottom: 1px solid var(--bl-border); font-size: 16px; }
      .form-body { display: grid; gap: 8px; padding: 12px; }
      .form-field { display: grid; gap: 4px; }
      .form-field input, .form-field select { width: 100%; }
      .form-error { min-height: 18px; color: var(--bl-error); font-size: var(--bl-text-sm); }
      .form-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 12px; border-top: 1px solid var(--bl-border); }
      #claim-dialog, #connection-dialog {
        max-width: min(440px, calc(100vw - 24px));
        border: 1px solid var(--bl-border-control);
        border-radius: var(--bl-radius-md);
        background: var(--bl-bg-strong);
        color: var(--bl-text);
      }
      #claim-dialog::backdrop, #connection-dialog::backdrop { background: var(--bl-overlay); }
      .claim-dialog-form, .connection-dialog-form { display: grid; gap: 8px; }
      .claim-dialog-form h3, .connection-dialog-form h2 { margin: 0 0 4px; }
      .connection-actions { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
      .connection-actions #status {
        min-width: 0;
        flex: 1 1 180px;
        overflow-wrap: anywhere;
      }
      #content-warning-dialog {
        width: min(560px, calc(100vw - 32px));
        max-height: calc(100vh - 32px);
        border: 2px solid var(--bl-warn);
        background: var(--bl-bg-strong);
        color: var(--bl-text);
      }
      #content-warning-dialog::backdrop { background: var(--bl-overlay); }
      .content-warning-form { display: grid; gap: 10px; }
      .content-warning-form h2 { margin: 0; color: var(--bl-warn); }
      .content-warning-ignore { display: flex; gap: 8px; align-items: flex-start; }
      .claim-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; margin-top: 6px; }
      @media (max-width: 900px) {
        #side { inset: 8px 8px 8px auto; width: min(360px, calc(100% - 16px)); }
        #control-hint { display: none; }
      }
      @media (max-width: 560px) {
        .player-toolbar .toolbar-brand { flex-basis: calc(100% - 72px); }
        .toolbar-character { max-width: 120px; }
      }
      @media (prefers-reduced-motion: reduce) {
        #side { transition: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/player.tsx"></script>
  </body>
</html>
