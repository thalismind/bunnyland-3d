name: CI

on:
  push:
  pull_request:

jobs:
  server:
    name: Server Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 3D plugin
        uses: actions/checkout@v4
        with:
          path: bunnyland-3d
      - name: Checkout Bunnyland server
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.BUNNYLAND_SERVER_REPOSITORY || 'ssube/bunnyland-server' }}
          path: bunnyland-server
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run server plugin tests
        run: bunnyland-3d/scripts/test-server
        env:
          BUNNYLAND_SERVER_PATH: ${{ github.workspace }}/bunnyland-server

  web:
    name: Web Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 3D plugin
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install browser dependencies
        run: |
          python -m pip install playwright
          python -m playwright install --with-deps chromium
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Build and test web client
        run: npm run check
        working-directory: web
      - name: Capture 3D screenshots
        run: npm run playwright
        working-directory: web
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: bunnyland-3d-screenshots
          path: web/artifacts/*.png
