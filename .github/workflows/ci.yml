name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  server:
    name: Server Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 3D plugin
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build server test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          target: test
          pull: true
          push: false
          load: true
          tags: bunnyland-3d-server-test:ci
      - name: Run server tests
        run: |
          mkdir -p .reports
          docker run --rm -v "${PWD}/.reports:/reports" bunnyland-3d-server-test:ci
      - name: Upload server test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-reports
          path: .reports/*.xml
          if-no-files-found: warn
      - name: Summarize server test reports
        if: always()
        run: python3 scripts/junit-summary .reports
      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          target: runtime
          pull: true
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/thalismind/bunnyland-3d-server:main

  web:
    name: Web Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 3D plugin
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build web test image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          target: test
          push: false
          load: true
          tags: bunnyland-3d-web-test:ci
          build-contexts: |
            bunnyland-ui-web=docker-image://ghcr.io/thalismind/bunnyland-ui-web:main
      - name: Run web tests
        run: |
          mkdir -p .reports
          docker run --rm -v "${PWD}/.reports:/reports" bunnyland-3d-web-test:ci
      - name: Build browser smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          target: browser-test
          push: false
          load: true
          tags: bunnyland-3d-browser-test:ci
          build-contexts: |
            bunnyland-ui-web=docker-image://ghcr.io/thalismind/bunnyland-ui-web:main
      - name: Run browser smoke
        run: |
          mkdir -p .reports/artifacts
          set +e
          docker run --rm -e BUNNYLAND_3D_ARTIFACT_DIR=/reports/artifacts -v "${PWD}/.reports:/reports" bunnyland-3d-browser-test:ci
          status=$?
          if [ "$status" -eq 0 ]; then
            printf '%s\n' '<testsuite name="browser-smoke" tests="1" failures="0" errors="0"><testcase classname="browser" name="playwright-world-3d"/></testsuite>' > .reports/browser-smoke.xml
          else
            printf '%s\n' '<testsuite name="browser-smoke" tests="1" failures="1" errors="0"><testcase classname="browser" name="playwright-world-3d"><failure message="browser smoke failed"/></testcase></testsuite>' > .reports/browser-smoke.xml
          fi
          exit "$status"
      - name: Upload web test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-reports
          path: .reports/*.xml
          if-no-files-found: warn
      - name: Upload browser screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-screenshots
          path: .reports/artifacts/*.png
          if-no-files-found: warn
      - name: Summarize web test reports
        if: always()
        run: python3 scripts/junit-summary .reports
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          target: runtime
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/thalismind/bunnyland-3d-web:main
          build-contexts: |
            bunnyland-ui-web=docker-image://ghcr.io/thalismind/bunnyland-ui-web:main
